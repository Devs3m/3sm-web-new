<ng-container *ngIf="number">

  <!-- Chat panel -->
  <div class="wa-panel" [class.wa-panel-open]="panelOpen">
    <!-- Panel header -->
    <div class="wa-panel-header">
      <div class="wa-panel-header-left">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="28" height="28" style="flex-shrink:0;">
          <path fill="#fff" d="M24 4C13 4 4 13 4 24c0 3.6 1 7 2.7 9.9L4 44l10.4-2.7C17.2 43 20.5 44 24 44c11 0 20-9 20-20S35 4 24 4z"/>
          <path fill="#25D366" d="M24 6.4C14.3 6.4 6.4 14.3 6.4 24c0 3.4 1 6.6 2.6 9.3L6.4 41.6l8.5-2.6c2.6 1.5 5.6 2.4 8.9 2.4C33.5 41.6 41.6 33.5 41.6 24S33.5 6.4 24 6.4z"/>
          <path fill="#fff" d="M33.5 28.6c-.5-.2-2.8-1.4-3.2-1.5-.4-.2-.7-.2-1 .2-.3.5-1.2 1.5-1.5 1.8-.3.3-.5.3-1 .1-.5-.2-2-.7-3.8-2.3-1.4-1.2-2.3-2.7-2.6-3.2-.3-.5 0-.7.2-.9.2-.2.5-.5.7-.7.2-.3.3-.5.5-.8.2-.3.1-.6 0-.8-.1-.2-1-2.5-1.4-3.4-.4-.9-.7-.8-1-.8h-.9c-.3 0-.8.1-1.2.6-.4.5-1.6 1.5-1.6 3.7s1.6 4.3 1.8 4.6c.2.3 3.1 4.8 7.6 6.7 1.1.5 1.9.7 2.6.9 1.1.3 2 .3 2.8.2.8-.1 2.5-1 2.9-2 .4-1 .4-1.8.3-2-.1-.2-.4-.3-.9-.5z"/>
        </svg>
        <div class="wa-panel-header-info">
          <span class="wa-panel-title">WhatsApp Chat</span>
          <span class="wa-panel-subtitle">Typically replies in minutes</span>
        </div>
      </div>
      <button class="wa-close-btn" (click)="togglePanel()" title="Close">✕</button>
    </div>

    <!-- Chat body -->
    <div class="wa-panel-body">
      <div class="wa-bubble-wrap">
        <div class="wa-bubble">
          <p>👋 Hi there! How can we help you?</p>
          <p style="margin-top:6px; font-size:12px; color:#666;">Type your message below and we'll connect you on WhatsApp.</p>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="wa-panel-footer">
      <textarea
        class="wa-input"
        [(ngModel)]="userMessage"
        placeholder="Type a message..."
        rows="2"
        (keydown.enter)="$event.preventDefault(); sendMessage()">
      </textarea>
      <button class="wa-send-btn" (click)="sendMessage()" title="Send on WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- FAB button -->
  <button class="wa-fab" (click)="togglePanel()" title="Chat on WhatsApp" aria-label="Chat on WhatsApp">
    <svg *ngIf="!panelOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="30" height="30">
      <path fill="#fff" d="M24 4C13 4 4 13 4 24c0 3.6 1 7 2.7 9.9L4 44l10.4-2.7C17.2 43 20.5 44 24 44c11 0 20-9 20-20S35 4 24 4z"/>
      <path fill="#25D366" d="M24 6.4C14.3 6.4 6.4 14.3 6.4 24c0 3.4 1 6.6 2.6 9.3L6.4 41.6l8.5-2.6c2.6 1.5 5.6 2.4 8.9 2.4C33.5 41.6 41.6 33.5 41.6 24S33.5 6.4 24 6.4z"/>
      <path fill="#fff" d="M33.5 28.6c-.5-.2-2.8-1.4-3.2-1.5-.4-.2-.7-.2-1 .2-.3.5-1.2 1.5-1.5 1.8-.3.3-.5.3-1 .1-.5-.2-2-.7-3.8-2.3-1.4-1.2-2.3-2.7-2.6-3.2-.3-.5 0-.7.2-.9.2-.2.5-.5.7-.7.2-.3.3-.5.5-.8.2-.3.1-.6 0-.8-.1-.2-1-2.5-1.4-3.4-.4-.9-.7-.8-1-.8h-.9c-.3 0-.8.1-1.2.6-.4.5-1.6 1.5-1.6 3.7s1.6 4.3 1.8 4.6c.2.3 3.1 4.8 7.6 6.7 1.1.5 1.9.7 2.6.9 1.1.3 2 .3 2.8.2.8-.1 2.5-1 2.9-2 .4-1 .4-1.8.3-2-.1-.2-.4-.3-.9-.5z"/>
    </svg>
    <svg *ngIf="panelOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="white">
      <path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/>
    </svg>
  </button>

</ng-container>
