<div class="finance-container">
  <app-finance-summary-strip
    [pendingInvoiceCount]="pendingInvoiceCount"
    [selectedCount]="selectedRows.length"
    [selectedTotalAmount]="selectedTotalAmount"
    [receiptHistoryCount]="receiptHistoryCount"
  />

  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <div class="finance-workspace">
    <aside class="finance-sidebar">
      <app-receipt-voucher-form
        [form]="form"
        [customerInputCtrl]="customerInputCtrl"
        [filteredCustomerOptions]="filteredCustomerOptions"
        [receiptNo]="receiptNo"
        [paymentReceiptType]="paymentReceiptType"
        [selectedRowsLength]="selectedRows.length"
        [selectedTotalAmount]="selectedTotalAmount"
        [outstandingAmount]="outstandingAmount"
        [receiveDisabled]="!selectedRows.length || isLoading"
        (customerOptionSelected)="onCustomerOptionSelected($event)"
        (collectPayments)="collectSelectedPayments()"
      />
    </aside>

    <div class="finance-main">
      <app-pending-open-receivables
        [form]="form"
        [filteredPendingData]="filteredPendingData"
        [selectedRowKeys]="selectedRowKeys"
        (selectedRowKeysChange)="selectedRowKeys = $event"
        [pendingInvoiceCount]="pendingInvoiceCount"
        [isLoading]="isLoading"
        [amountColumnFormat]="amountColumnFormat"
        [dateCellValue]="dateCellValue"
        (selectionChanged)="onSelectionChanged($event)"
        (refreshRange)="onRefresh()"
      />
    </div>
  </div>

  <app-receipt-history-grid
    [filteredReceiptData]="filteredReceiptData"
    [isLoadingReceipts]="isLoadingReceipts"
    [amountColumnFormat]="amountColumnFormat"
    [receiptDateCellValue]="receiptDateCellValue"
    [invoiceDateCellValue]="invoiceDateCellValue"
    (refresh)="loadReceipts()"
  />
</div>
