<section>
    <div class="form-backdrop" [class.open]="isFormOpen" (click)="restCityForm()"></div>
    <div class="form-container" [class.open]="isFormOpen">
        <p style="font-size: larger;">Add City</p>
        <button (click)="restCityForm()" class="close-btn">&times;</button>
          <form class="form-section" [formGroup]="cityForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">City Name</mat-label>
            <input matInput placeholder="Instance" class="mat-input-element custom-placeholder" formControlName="cityname">
        </mat-form-field >
        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">City State</mat-label>
            <input matInput placeholder="Owner" class="mat-input-element custom-placeholder" formControlName="citystate">
        </mat-form-field>
        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">City Country</mat-label>
            <input matInput placeholder="Manager Email" class="mat-input-element custom-placeholder" formControlName="citycountry">
        </mat-form-field>
        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">Active</mat-label>
           <select matNativeControl formControlName="isactive">
            <option  value="" disabled>Select</option>
            <option  value="true">Active</option>
            <option  value="false">Inactive</option>
           </select>     
        </mat-form-field>
        <div class="form-submit">
            <button mat-raised-button type="submit" class="btn-primary" (click)="createCity()">
              Submit
            </button>
            </div>
</form>
    </div>

        <div class="account-cards">
          <mat-card class="account-card total">
            <div class="card-content account-stat-row">
              <div class="card-icon"><mat-icon>location_city</mat-icon></div>
              <span class="card-label">City</span>
              <span class="card-value">{{ totalCity }}</span>
            </div>
          </mat-card>
          <mat-card class="account-card active">
            <div class="card-content account-stat-row">
              <div class="card-icon"><mat-icon>check_circle</mat-icon></div>
              <span class="card-label">Active</span>
              <span class="card-value">{{ activeCity }}</span>
            </div>
          </mat-card>
          <mat-card class="account-card inactive">
            <div class="card-content account-stat-row">
              <div class="card-icon"><mat-icon>cancel</mat-icon></div>
              <span class="card-label">In-Active</span>
              <span class="card-value">{{ deactiveCity }}</span>
            </div>
          </mat-card>
        </div>

        <div class="pos-relative">
    <dx-data-grid 
        [dataSource]="apiData"
        [allowColumnReordering]="true" 
        [allowColumnResizing]="true" 
        [showBorders]="true"
        [headerFilter]="{ visible: true }" 
        [searchPanel]="{ visible: true, width: 240, placeholder: 'Type to search...' }" 
        [paging]="{ pageSize: 12 }" 
        title="City" 
        [showBorders]="true" (onExporting)="onExporting($event)">

      <dxo-toolbar>
        <dxi-item location="before">
          <div *dxTemplate>
            <button (click)="toggleForm()" class="add-btn">
              <mat-icon>add_circle</mat-icon>
            </button>
          </div>
        </dxi-item>
        <dxi-item name="searchPanel"></dxi-item>
        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>
    
        <dxi-column
          dataField="cityid"
          caption="City ID"
          [width]="130"
          [allowSorting]="true"
          [calculateSortValue]="cityIdSortValue"
          [sortOrder]="'desc'"
          [sortIndex]="0">
        </dxi-column>
        <dxi-column dataField="cityname" caption="City Name" [width]="250"></dxi-column>
        <dxi-column dataField="createddate" caption="Created Date" [width]="200" [calculateCellValue]="createdDateCellValue"></dxi-column>
        <dxi-column dataField="updateddate" caption="Updated Date" [width]="200" [calculateCellValue]="updatedDateCellValue"></dxi-column>
        <dxi-column dataField="isactive" caption="Active" [width]="200"></dxi-column>
        <dxi-column [visible]="true" caption="Action" alignment="center" cellTemplate="actionTemplate" [width]="240"></dxi-column>
      
        <div *dxTemplate="let data of 'actionTemplate'" style="display: flex; gap: 10px; justify-content: center;">
          <a (click)="editItem(data.data)" style="cursor: pointer;">
            <span class="material-symbols-outlined action-icon edit-icon" title="Edit">edit</span>
          </a>
          <a (click)="deleteItem(data.data)" style="cursor: pointer;">
            <span class="material-symbols-outlined action-icon delete-icon" title="Delete">delete</span>
          </a>
        </div>
    
    
          <dxo-export [enabled]="true" [allowExportSelectedData]="true"></dxo-export>
        </dx-data-grid>
    
      </div>
  </section>
