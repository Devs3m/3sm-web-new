<section>
  <div class="form-backdrop" [class.open]="isFormOpen" (click)="restvatForm()"></div>
  <div class="form-container" [class.open]="isFormOpen">
    <p style="font-size: larger;">Add VAT %</p>
    <button (click)="restvatForm()" class="close-btn">&times;</button>
      <form class="form-section" [formGroup]="vatForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">VAT%</mat-label>
            <input matInput placeholder="Instance" class="mat-input-element custom-placeholder" formControlName="vatpercent">
        </mat-form-field >
        <mat-form-field appearance="outline" class="form-field">
            <mat-label style="color:black">Active</mat-label>
           <select matNativeControl formControlName="vatisactive">
            <option  value="" disabled>Select</option>
            <option  value="true">Active</option>
            <option  value="false">Inactive</option>
           </select>     
        </mat-form-field>
        <div class="form-submit">
          <button mat-raised-button type="submit" class="btn-primary" (click)="createVat()">
            Submit
          </button>
          </div>
</form>
  </div>
  
  
      <div class="account-cards">
        <mat-card class="account-card total">
          <div class="card-content account-stat-row">
            <div class="card-icon"><mat-icon>percent</mat-icon></div>
            <span class="card-label">VAT %</span>
            <span class="card-value">{{ totalVat }}</span>
          </div>
        </mat-card>
       <mat-card class="account-card active">
          <div class="card-content account-stat-row">
            <div class="card-icon"><mat-icon>check_circle</mat-icon></div>
            <span class="card-label">Active</span>
            <span class="card-value">{{ activeVat }}</span>
          </div>
        </mat-card>
        <mat-card class="account-card inactive">
          <div class="card-content account-stat-row">
            <div class="card-icon"><mat-icon>cancel</mat-icon></div>
            <span class="card-label">In-Active</span>
            <span class="card-value">{{ deactiveVat }}</span>
          </div>
        </mat-card>
      </div>

      <div class="pos-relative">
        <div class="btn-pos-list">
          <button (click)="toggleForm()" class="add-btn" >
            <mat-icon>add_circle</mat-icon>
          </button>
        </div>
        
      <dx-data-grid 
      [dataSource]="apiData"
      [allowColumnReordering]="true" 
      [allowColumnResizing]="true" 
      [showBorders]="true"
      [headerFilter]="{ visible: true }" 
      [searchPanel]="{ visible: true, width: 240, placeholder: 'Type to search...' }" 
      title="VAT %" 
      [paging]="{ pageSize: 12 }" 
      [showBorders]="true" (onExporting)="onExporting($event)">
  

      <dxi-column dataField="vatid"[allowSorting]="true" [sortOrder]="'asc'"caption="Vat ID" [width]="130"></dxi-column>
      <dxi-column dataField="vatpercent" caption="VAT%" [width]="200" alignment="left"
          [format]="{ type: 'fixedPoint', precision: 2 }"></dxi-column>
      <dxi-column dataField="createddate" caption="Created Date" [width]="220" [calculateCellValue]="createdDateCellValue"></dxi-column>
      <dxi-column dataField="updateddate" caption="Updated Date" [width]="220" [calculateCellValue]="updatedDateCellValue"></dxi-column>
      <dxi-column dataField="vatisactive" caption="Active" [width]="230"></dxi-column>
      <dxi-column [visible]="true" caption="Action" alignment="center" cellTemplate="actionTemplate" [width]="230"></dxi-column>
    
      <div *dxTemplate="let data of 'actionTemplate'" style="display: flex; gap: 10px; justify-content: center;">
        <a (click)="editItem(data.data)" style="cursor: pointer;">
          <span class="material-symbols-outlined action-icon edit-icon" title="Edit">edit</span>
        </a>
        <a (click)="deleteItem(data.data)" style="cursor: pointer;">
          <span class="material-symbols-outlined action-icon delete-icon" title="Delete">delete</span>
        </a>
      </div>
  
        <dxo-export [enabled]="true" [allowExportSelectedData]="true"></dxo-export>
      </dx-data-grid>
  
    </div>
</section>
